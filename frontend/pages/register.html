<section class="page-section auth-page" id="authPage">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Register</h1>
            <p>Story Archive에 사용할 계정을 만듭니다.</p>
        </div>

        <form class="auth-form" id="registerForm">
            <label class="auth-field">
                <span>Email</span>
                <input
                    type="email"
                    id="registerEmail"
                    autocomplete="email"
                    placeholder="you@example.com"
                    required
                />
            </label>

            <label class="auth-field">
                <span>Username</span>
                <input
                    type="text"
                    id="registerUsername"
                    autocomplete="username"
                    placeholder="사용자 이름"
                    required
                />
            </label>

            <label class="auth-field">
                <span>Password</span>
                <input
                    type="password"
                    id="registerPassword"
                    autocomplete="new-password"
                    placeholder="비밀번호"
                    required
                />
            </label>

            <label class="auth-field">
                <span>Password Check</span>
                <input
                    type="password"
                    id="registerPasswordCheck"
                    autocomplete="new-password"
                    placeholder="비밀번호 확인"
                    required
                />
            </label>

            <button class="primary-btn auth-submit" type="submit">
                회원가입
            </button>
        </form>

        <div class="auth-links">
            <button type="button" data-page="login">
                이미 계정이 있어요
            </button>
        </div>

        <p class="auth-message" id="authMessage"></p>
    </div>
</section>
