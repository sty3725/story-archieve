<section class="page-section auth-page" id="authPage">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Login</h1>
            <p>Story Archive에 다시 들어가기</p>
        </div>

        <form class="auth-form" id="loginForm">
            <label class="auth-field">
                <span>Email</span>
                <input type="email" id="loginEmail" autocomplete="email" required />
            </label>

            <label class="auth-field">
                <span>Password</span>
                <input type="password" id="loginPassword" autocomplete="current-password" required />
            </label>

            <button class="primary-btn auth-submit" type="submit">
                로그인
            </button>
        </form>

        <div class="auth-links">
            <button type="button" data-page="register">
                계정 만들기
            </button>
            <button type="button" id="forgotPasswordBtn">
                비밀번호를 잊었나요?
            </button>
        </div>

        <p class="auth-message" id="authMessage"></p>
    </div>
</section>
