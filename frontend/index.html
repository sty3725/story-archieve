<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story Archive</title>

    <!-- 공통 UI / 테마 / 사이드바 스타일 -->
    <link rel="stylesheet" href="./css/common.css" />
</head>
<body class="">
    <!--
        app-shell
        - index.html은 전체 앱의 고정 프레임 역할만 한다.
        - 실제 페이지 내용은 main.js가 #page-view 안으로 불러온다.
    -->
    <div class="app-shell ">
        <aside class="main-sidebar ">

            <div class="sidebar-component sidebar-brand">
                <div class="sidebar-brand__mark" aria-hidden="true">✦</div>
                <div class="sidebar-brand__text">Story Archive</div>
            </div>
            
            <div class="sidebar-component user-profile">
                <div id="user-img"></div>
                <div id="user-nickname">tesius</div>
            </div>


            <div class="sidebar-component navigation">
                <label >Main Menu</label>

                <button class="main-nav__item" type="button" data-page="dashboard">
                <span class="main-nav__icon" aria-hidden="true">⌂</span>
                <span>Dashboard</span>
                </button>

                <button class="main-nav__item is-active" type="button" data-page="archive">
                <span class="main-nav__icon" aria-hidden="true">▣</span>
                <span>Archive</span>
                </button>

                <button class="main-nav__item" type="button" data-page="classroom">
                <span class="main-nav__icon" aria-hidden="true">▱</span>
                <span>Class</span>
                </button>

                <button class="main-nav__item" type="button" data-page="classroom">
                <span class="main-nav__icon" aria-hidden="true">⚙</span>
                <span>Setting</span>
                </button>
            
            </div>


            <div class="sidebar-component recent">
                <label>◷ 최근 문서</label>             

                <ul class="recent-doc-list">
                    <li>
                        <button type="button" class="main-nav__item is-active" data-page="editor">
                        <span class="recent-doc__dot" aria-hidden="true"></span>
                        <span>3. 균열의 시작</span>
                        </button>
                    </li>
                    <li>
                        <button type="button" class="main-nav__item" data-page="editor">
                        <span class="recent-doc__dot" aria-hidden="true"></span>
                        <span>2. 밤이 긴 새벽</span>
                        </button>
                    </li>
                    <li>
                        <button type="button" class="main-nav__item" data-page="editor">
                        <span class="recent-doc__dot" aria-hidden="true"></span>
                        <span>1. 프롤로그</span>
                        </button>
                    </li>
                    <li>
                        <button type="button" class="main-nav__item" data-page="editor">
                        <span class="recent-doc__dot" aria-hidden="true"></span>
                        <span>4. 어둠 속의 선택</span>
                        </button>
                    </li>
                    <li>
                        <button type="button" class="main-nav__item" data-page="editor">
                        <span class="recent-doc__dot" aria-hidden="true"></span>
                        <span>5. 새벽의 빛</span>
                        </button>
                    </li>
                    </ul>
            </div>


            <div class="sidebar-component sidebar-bottom">
                <button class="shortcut-nav__item" type="button" data-page="trash">
                    <span aria-hidden="true">⌫</span>
                    <span>휴지통</span>
                </button>   
            </div>

            <div class="sidebar-component fold">
                <button
                type="button"
                class="sidebar-collapse-toggle"
                id="sidebarCollapseToggle"
                aria-label="사이드바 접기"
                aria-expanded="true">❮
                </button>
            </div>

        </aside>

        <!-- 메인 영역 -->
        <main class="page-content" id="page-content" tabindex="-1">
            <!--
                main.js가 ./pages/archive.html 등을 fetch해서 이 안에 삽입한다.
                파일이 없을 때도 화면이 비지 않도록 기본 placeholder를 둔다.
            -->
            <section class="empty-page-state">
                <h1>Story Archive</h1>
                <p>왼쪽 메뉴에서 페이지를 선택하세요.</p>
            </section>
        </main>
        

        <aside id="sub-sidebar">
        </aside>
    </div>
<!-- 공통 동작: 페이지 로딩, 테마 선택, 글자 크기 설정 -->
<script src="./js/main.js"></script>
</body>
</html>
