<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/archive.css" />
    <link rel="stylesheet" href="./css/auth.css" />
</head>

<body>
<div class="app-layout sidebar-closed">
    
    <aside class="sidebar ">
        <div class="logo"><img src="./media/logo.png" /></div>
        <button class="sidebar-bookmark" id="sidebarBookmark" type="button" aria-label="사이드바 열기">
            <img src="./media/bookmark.png" alt="" />
        </button>
        <div class="menu_label">Menu</div>
        <menu class="sidebar-menu">
            <button type="button" class="menu-item active" data-page="archive">Archive</button>
            <button type="button" class="menu-item" data-page="classroom">Class room</button>
            <button type="button" class="menu-item" data-page="statistics">Statistics</button>
        </menu>
        <div class="menu_label">shortcut</div>
        <div class="shortcut">
            <div></div>
            <div></div>
            <div></div>
        </div> 
        <div class="sidebar-bottom">
            <button class="profile-button" id="profileButton" type="button" data-page="mypage">
                <span class="profile-avatar">U</span>
                <span class="profile-name" id="profileName">User</span>
            </button>

            <button class="sidebar-menu-btn" id="preferenceToggle" type="button">
                Preference
            </button>
        </div>
    </aside>

    <div class="preference-panel" id="preferencePanel" hidden>
        <div class="preference-header">
            <h2>Preference</h2>
            <button type="button" id="preferenceCloseBtn">닫기</button>
        </div>

        <section class="preference-group">
            <h3>사이드바 색상</h3>

            <div class="sidebar-preset-grid">
                <button type="button" class="sidebar-color-preset" data-sidebar-preset="midnight">
                    <span style="background:#050913;"></span>
                    Midnight
                </button>

                <button type="button" class="sidebar-color-preset" data-sidebar-preset="violet">
                    <span style="background:#34135f;"></span>
                    Violet
                </button>

                <button type="button" class="sidebar-color-preset" data-sidebar-preset="deepBlue">
                    <span style="background:#073b72;"></span>
                    Deep Blue
                </button>

                <button type="button" class="sidebar-color-preset" data-sidebar-preset="emerald">
                    <span style="background:#064e3b;"></span>
                    Emerald
                </button>

                <button type="button" class="sidebar-color-preset" data-sidebar-preset="wine">
                    <span style="background:#5f1238;"></span>
                    Wine
                </button>

                <button type="button" class="sidebar-color-preset" data-sidebar-preset="slate">
                    <span style="background:#1f2937;"></span>
                    Slate
                </button>
            </div>

            <div class="preference-options sidebar-extra-options">
                <button type="button" class="preference-option" id="sidebarDefaultBtn">
                    기본
                </button>

                <button type="button" class="preference-option" id="sidebarRandomBtn">
                    랜덤
                </button>
            </div>
            
                
                
            <h3>테마</h3>

            <div class="preference-options">
                <button type="button" class="preference-option" data-theme-option="light">
                    Light
                </button>
                <button type="button" class="preference-option" data-theme-option="dark">
                    Dark
                </button>
                <button type="button" class="preference-option" data-theme-option="custom">
                    Custom
                </button>
            </div>


        </section>

        <section class="preference-group" id="customBackgroundGroup">
            <h3>사용자 배경색</h3>

            <label class="color-picker-row sidebar-color-row" id="customSidebarGroup">
                <span>Sidebar</span>
                <input type="color" id="customSidebarInput" value="#050913" />
            </label>

            <label class="color-picker-row">
                <span>Background</span>
                <input type="color" id="customBackgroundInput" value="#f5f5f5" />
            </label>
        </section>

        <section class="preference-group">
            <h3>글자 크기</h3>

            <div class="preference-options">
                <button type="button" class="preference-option" data-font-size-option="small">
                    작게
                </button>
                <button type="button" class="preference-option" data-font-size-option="medium">
                    보통
                </button>
                <button type="button" class="preference-option" data-font-size-option="large">
                    크게
                </button>
            </div>
        </section>

        <button type="button" class="sub-btn" id="resetPreferenceBtn">
            설정 초기화
        </button>
    </div>

</div>

<!-- 메인 컨텐츠 비회원은 그냥 소개템플릿, 회원은 대쉬보드. -->

<main class="page-content" id="pageContent">
</main>

<script type="text/javascript" src="./js/archive/archive.js"></script>
<script src="./js/auth.js"></script>
<script type="text/javascript" src="./js/main.js"></script>
</body>
</html>
